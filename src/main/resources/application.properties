# Simple Chat Server Configuration
# Default Profile
spring.profiles.active=@spring.profiles.active@

# Common Configuration
server.port=${PORT:8080}
spring.application.name=simple-chat-server

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket Configuration
spring.websocket.message-size-limit=65536

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Security Configuration
cors.allowed-origins=http://localhost:8080,http://localhost:3000
jwt.secret=beam-super-secret-key-for-jwt-token-generation-please-change-in-production-environment-at-least-256-bits
jwt.expiration=86400000

# File Storage
file.upload-dir=uploads
file.max-size=10485760

# Logging
logging.level.com.beam=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# Default to dev profile if not specified
spring.profiles.default=dev